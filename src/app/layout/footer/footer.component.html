<footer class="app-footer py-12 text-sm">
  <div class="content-shell flex flex-col gap-6 md:flex-row md:items-center md:justify-between">
    <p>&copy; {{ year }} Vishakha. All rights reserved.</p>

    <div class="flex flex-wrap gap-4">
      @for (channel of contactChannels; track channel.label) {
        <a
          [href]="channel.href"
          [appExternalLink]="channel.href.startsWith('http')"
          class="footer-link font-medium"
        >
          {{ channel.label }}
        </a>
      }
    </div>
  </div>
</footer>
