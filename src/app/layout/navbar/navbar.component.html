<header class="app-header fixed inset-x-0 top-0 z-[5000]">
  <div class="content-shell flex items-center justify-between py-3 md:py-4">
    <a routerLink="/" class="text-lg font-bold tracking-tight">Vishakha</a>

    <nav aria-label="Primary" class="primary-nav hidden gap-1 text-sm font-medium md:flex">
      @for (item of navigationItems; track item.id) {
        <a [routerLink]="item.route" [fragment]="item.id" class="nav-link" [class.nav-link-active]="activeSection() === item.id">
          {{ item.label }}
        </a>
      }
    </nav>

    <div class="flex items-center gap-3">
      <button
        type="button"
        (click)="toggleTheme()"
        class="icon-button inline-flex h-10 w-10 items-center justify-center rounded-full"
        [attr.aria-label]="toggleLabel()"
      >
        <svg viewBox="0 0 24 24" class="h-5 w-5" aria-hidden="true">
          <path fill="currentColor" [attr.d]="theme() === 'dark' ? sunIconPath : moonIconPath"></path>
        </svg>
      </button>

      <a
        [href]="hero.primaryCta.href"
        class="btn-premium btn-primary hidden px-5 py-2 text-sm font-semibold focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-accent md:inline-flex"
      >
        {{ hero.primaryCta.label }}
      </a>
    </div>
  </div>
</header>
