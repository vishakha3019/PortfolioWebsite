<section id="architecture" class="section-gap">
  <div class="content-shell">
    <app-section-heading
      eyebrow="Architecture Thinking"
      title="How I make frontend systems scalable and predictable"
      description="The engineering lens behind my implementation decisions."
    ></app-section-heading>

    <div class="mt-8 grid gap-4 md:grid-cols-3">
      @for (principle of principles; track principle.title; let principleIndex = $index) {
        <article appRevealOnScroll [appRevealOnScrollDelay]="principleIndex * 65" class="surface-card p-5">
          <h3 class="text-lg font-semibold text-slate-900 dark:text-slate-100">{{ principle.title }}</h3>
          <p class="mt-2 text-sm text-slate-600 dark:text-slate-300">{{ principle.detail }}</p>
        </article>
      }
    </div>
  </div>
</section>
