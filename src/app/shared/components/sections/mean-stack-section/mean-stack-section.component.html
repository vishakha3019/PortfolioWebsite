<section id="mean-stack" class="section-gap">
  <div class="content-shell">
    <app-section-heading
      eyebrow="MEAN Stack Positioning"
      title="Backend and deployment capabilities that reduce delivery risk"
      description="Angular is my primary layer, with practical Node/Express, MongoDB, Docker, and AWS handoff readiness."
    ></app-section-heading>

    <div class="mt-8 grid gap-4 md:grid-cols-3">
      @for (capability of capabilities; track capability.title; let meanIndex = $index) {
        <article appRevealOnScroll [appRevealOnScrollDelay]="meanIndex * 60" class="surface-card p-6">
          <h3 class="text-base font-semibold text-slate-900 dark:text-slate-100">{{ capability.title }}</h3>
          <p class="mt-3 text-sm leading-relaxed text-slate-600 dark:text-slate-300">{{ capability.detail }}</p>
          <p class="mt-4 text-xs font-medium text-slate-500 dark:text-slate-400">
            Tools: {{ capability.tools.join(' | ') }}
          </p>
        </article>
      }
    </div>
  </div>
</section>
